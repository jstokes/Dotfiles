bind C-a send-prefix
unbind C-b
set -g prefix C-a

# use ZSH
set-option -g default-shell /bin/zsh

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Highlight active window
set-window-option -g window-status-current-style bg=red
setw -g aggressive-resize off

# auto window rename
set-window-option -g automatic-rename
set -g history-limit 100000
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# quick pane cycling
unbind ^a
bind ^a select-pane -t :.+

# Create splits and vertical splits
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -c "#{pane_current_path}"

# set-window-option -g mode-mouse on
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"


# Reorder windows when one is deleted
set-option -g renumber-windows on


# Pane resize in all four directions using vi bindings.
bind-key J resize-pane -D 3
bind-key K resize-pane -U 3
bind-key H resize-pane -L 3
bind-key L resize-pane -R 3
bind-key C-j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key C-s command-prompt -p "send pane to:"  "join-pane -t '%%'"

bg="default"
default_fg="#D8DEE9" 
session_fg="#A3BE8C"
session_selection_fg="#3B4252"
session_selection_bg="#81A1C1"
active_window_fg="#88C0D0"
active_pane_border="#abb2bf"

set -g status-left-length 200   # default: 10
set -g status-right-length 200  # default: 10
set -g status-left "#[fg=${session_fg},bold,bg=${bg}] #S #[fg=${default_fg},nobold,bg=${bg}] | "
set -g status-right " #{cpu -i 3}   #{mem} "
set -g status-justify left
set -g status-position top
set -g status-style "bg=${bg}"
set -g window-status-format "#[fg=${default_fg},bg=default] #I:#W"
set -g window-status-current-format "#[fg=${active_window_fg},bold,bg=black]  #[underscore]#I:#W"
set -g window-status-last-style "fg=${default_fg},bg=default"
set -g message-command-style "bg=default,fg=${default_fg}"
set -g message-style "bg=default,fg=${default_fg}"
set -g mode-style "bg=${session_selection_bg},fg=${session_selection_fg}"
set -g pane-active-border-style "fg=${active_pane_border},bg=default"
set -g pane-border-style "fg=brightblack,bg=default"

# Dim inactive panes
set -g window-style 'fg=colour245,bg=colour238'
set -g window-active-style 'fg=default,bg=terminal'

set -g base-index 1
set-window-option -g pane-base-index 1

bind r source-file ~/.tmux.conf

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# New workspace with optional git worktree (floating popup)
bind W display-popup -E -w 60 -h 15 "tmux-worktree-window '#{session_name}' '#{pane_current_path}'"

# multiplexer.nvim - seamless navigation with neovim
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g update-environment "MULTIPLEXER MULTIPLEXER_LIST I3SOCK \
  ZELLIJ_PANE_ID ZELLIJ KITTY_WINDOW_ID KITTY_LISTEN_ON KITTY_PID \
  WEZTERM_PANE WEZTERM_UNIX_SOCKET WEZTERM_EXECUTABLE"

# Navigation with Ctrl+Arrow keys
bind-key -n C-Left if -F '#{@pane-is-vim}' { send-keys C-Left } { run-shell 'multiplexer activate_pane left' }
bind-key -n C-Down if -F '#{@pane-is-vim}' { send-keys C-Down } { run-shell 'multiplexer activate_pane down' }
bind-key -n C-Up if -F '#{@pane-is-vim}' { send-keys C-Up } { run-shell 'multiplexer activate_pane up' }
bind-key -n C-Right if -F '#{@pane-is-vim}' { send-keys C-Right } { run-shell 'multiplexer activate_pane right' }

# Copy mode navigation
bind-key -T copy-mode-vi C-Left if -F '#{@pane-is-vim}' { send-keys C-Left } { run-shell 'multiplexer activate_pane left' }
bind-key -T copy-mode-vi C-Down if -F '#{@pane-is-vim}' { send-keys C-Down } { run-shell 'multiplexer activate_pane down' }
bind-key -T copy-mode-vi C-Up if -F '#{@pane-is-vim}' { send-keys C-Up } { run-shell 'multiplexer activate_pane up' }
bind-key -T copy-mode-vi C-Right if -F '#{@pane-is-vim}' { send-keys C-Right } { run-shell 'multiplexer activate_pane right' }

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'nhdaly/tmux-scroll-copy-mode '
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'
set -g @plugin 'laktak/extrakto '

run ~/.tmux/plugins/tpm/tpm
